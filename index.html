<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tall Bricks Email Signature</title>

    <!-- Office.js - required for all Outlook add-ins -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Our signature logic -->
    <script src="signature.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #333;
            padding: 16px;
            margin: 0;
            background: #fff;
        }
        .status {
            color: #1a6fa3;
            font-size: 12px;
            margin-top: 8px;
        }
        .logo {
            margin-top: 12px;
        }
        .logo img {
            width: 140px;
        }
    </style>
</head>
<body>
    <div class="status" id="status">Inserting signature...</div>
    <div class="logo">
        <img src="https://www.tallbricks.com/wp-content/uploads/tb-email-logo.jpg" 
             alt="Tall Bricks Real Estate LLC">
    </div>

    <script>
        // Update status message once Office is ready
        Office.onReady(() => {
            document.getElementById("status").textContent = "Signature applied.";
            setTimeout(() => {
                document.getElementById("status").textContent = "";
            }, 2000);
        });
    </script>
</body>
</html>
